<body>
    <header>
        <h1>CookBook: Search field</h1>
        <form onsubmit="return false" spellcheck="false" autocomplete="off">
            <search>
                <input type="search" placeholder="girls' names beginning with A">
                <hr>
                <output></output>
            </search>
        </form>
    </header>
    <hr>
    <main></main>
    <script type="module">
        import { JSxdb } from '../jsxdb.js';

        addEventListener('load', async event => {

            // prepare database
            const db = await JSxdb.init("searchfield.db", {
                1: {
                    values: "@id, name",
                },
            });

            const [store1] = await db.write("values");
            const count = await store1.count();

            // fill the db only one times
            if (!count) {

                for await (const item of names) {
                    store1.add(item);
                }
            }

            db.close();

            const inputbox = document.querySelector('input');
            const outputbox = document.querySelector('output');
            const script = document.querySelector('script[type]');
            const main = document.querySelector('main');

            inputbox.addEventListener('focus', async event => {

                async function oninput(event) {
                    const db = await JSxdb.open('searchfield.db');
                    const [store1] = await db.read("values");

                    const value = event.target.value.trim();

                    if (value.length) {
                        store1.ignoreCase("name", value, true)
                            .then(result => result.map(entry => entry.name))
                            // limit to 100 items, for example 
                            .then(result => result.slice(0, 100))
                            .then(result => {
                                outputbox.innerHTML = result.join(', ');
                            })
                    } else {
                        outputbox.innerHTML = '';
                    }
                }

                event.target.addEventListener('input', oninput);
                event.target.addEventListener('blur', event => {
                    event.target.removeEventListener('input', oninput);
                    db.close();
                }, { once: true });
            });

            main.innerText = script.innerText;
        });
    </script>
</body>
